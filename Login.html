<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    /* Full-page background image */
    body {
      margin: 0;
      padding: 0;
      background: url("Images/Logic is progressive.JPG") no-repeat center center fixed;
      background-size: cover;
      font-family: Arial, sans-serif;
    }

    /* Popup overlay */
    .popup {
      display: flex;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); /* dark overlay */
      z-index: 999;
    }

    /* Popup box */
    .popup-content {
      background: rgba(255,255,255,0.95); /* slightly transparent */
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      animation: fadeIn 0.3s ease;
      position: relative;
    }

    /* Inputs */
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    /* Buttons */
    button {
      margin: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #6c63ff;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #4b45d6;
    }

    /* Close button */
    .close-btn {
      position: absolute;
      top: 10px; right: 15px;
      font-size: 24px;
      cursor: pointer;
      color: #333;
    }

    /* Animation */
    @keyframes fadeIn {
      from {opacity: 0; transform: scale(0.9);}
      to {opacity: 1; transform: scale(1);}
    }
  </style>
</head>
<body>
    <div class="popup" id="loginPopup">
    <div class="popup-content">
      <span class="close-btn" onclick="closePopup()">&times;</span>
  <h2>Login / Sign Up</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Log In</button>
   </div>
  </div>

  <script type="module">
    // ✅ Only one firebaseConfig
    const firebaseConfig = {
      apiKey: "AIzaSyAgaGbqIhaJrY_il83Cd0qWAcSQ4-w-59U",
      authDomain: "my-portfolio-fd7a4.firebaseapp.com",
      projectId: "my-portfolio-fd7a4",
      storageBucket: "my-portfolio-fd7a4.appspot.com",
      messagingSenderId: "1075228854748",
      appId: "1:1075228854748:web:cad3c816749243bc7fa719",
      measurementId: "G-84G30WZ1FK"
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // ✅ Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    async function signup() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      try {
        await createUserWithEmailAndPassword(auth, email, password);
        alert("Account created!");
        window.location.href = "builder.html";
      } catch (error) {
        alert(error.message);
      }
    }

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
        alert("Login successful!");
        window.location.href = "builder.html";
      } catch (error) {
        alert(error.message);
      }
    }
  </script>
</body>
</html>

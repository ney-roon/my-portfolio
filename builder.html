<!DOCTYPE html>
<html>
<head>
  <title>Portfolio Builder</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #6c63ff, #a29bfe);
      color: #333;
    }

    a {
      display: inline-block;
      margin: 20px;
      text-decoration: none;
      color: #fff;
      font-weight: bold;
    }

    h2 {
      text-align: center;
      color: #fff;
      margin-top: 10px;
    }

    .builder-controls {
      text-align: center;
      margin: 20px;
    }

    button {
      background: #6c63ff;
      color: white;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #4b45d6;
    }

    input[type="file"] {
      margin: 10px;
      padding: 5px;
    }

    #builderArea {
      border: 2px dashed #6c63ff;
      min-height: 300px;
      padding: 20px;
      margin: 20px auto;
      max-width: 900px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .block {
      background: #f0f0f0;
      margin: 10px;
      padding: 15px;
      border-radius: 8px;
      cursor: grab;
      transition: transform 0.2s;
    }
    .block:hover {
      transform: scale(1.02);
    }
    .block img {
      max-width: 200px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <a href="index.html">← Back to Home</a>
  <h2>Portfolio Builder</h2>

  <div class="builder-controls">
    <button onclick="addTextBlock()">Add Text</button>
    <input type="file" id="imageInput">
    <button onclick="addImageBlock()">Add Image</button>
    <button onclick="saveLayout()">Save Layout</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="builderArea"></div>

  <script type="module">
    const firebaseConfig = {
      apiKey: "AIzaSyAgaGbqIhaJrY_il83Cd0qWAcSQ4-w-59U",
      authDomain: "my-portfolio-fd7a4.firebaseapp.com",
      projectId: "my-portfolio-fd7a4",
      storageBucket: "my-portfolio-fd7a4.appspot.com",
      messagingSenderId: "1075228854748",
      appId: "1:1075228854748:web:cad3c816749243bc7fa719",
      measurementId: "G-84G30WZ1FK"
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    function addTextBlock() {
      const builderArea = document.getElementById("builderArea");
      const newBlock = document.createElement("div");
      newBlock.className = "block";
      newBlock.contentEditable = true;
      newBlock.innerText = "Edit me!";
      builderArea.appendChild(newBlock);
    }

    async function addImageBlock() {
      const file = document.getElementById("imageInput").files[0];
      if (!file) return alert("No file selected!");
      const user = auth.currentUser;
      if (!user) return alert("You must be logged in!");

      const storageRef = ref(storage, `users/${user.uid}/images/${file.name}`);
      await uploadBytes(storageRef, file);
      const url = await getDownloadURL(storageRef);

      const builderArea = document.getElementById("builderArea");
      const newBlock = document.createElement("div");
      newBlock.className = "block";
      newBlock.innerHTML = `<img src="${url}" alt="${file.name}">`;
      builderArea.appendChild(newBlock);

      await setDoc(doc(db, "users", user.uid, "portfolio", "main"), {
        projects: [{ name: file.name, imageUrl: url }]
      }, { merge: true });
    }

    async function saveLayout() {
      const blocks = [...document.querySelectorAll("#builderArea .block")].map(b => b.outerHTML);
      const user = auth.currentUser;
      if (!user) return alert("You must be logged in!");
      await setDoc(doc(db, "users", user.uid, "portfolio", "layout"), { blocks });
      alert("Layout saved!");
    }

    async function loadLayout(uid) {
      const ref = doc(db, "users", uid, "portfolio", "layout");
      const snap = await getDoc(ref);
      if (snap.exists()) {
        const data = snap.data();
        const builderArea = document.getElementById("builderArea");
        builderArea.innerHTML = "";
        data.blocks.forEach(block => builderArea.insertAdjacentHTML("beforeend", block));
      }
    }

    function logout() {
      signOut(auth).then(() => window.location.href = "Login.html");
    }

    onAuthStateChanged(auth, (user) => {
      if (user) loadLayout(user.uid);
      else window.location.href = "Login.html";
    });
  </script>
</body>
</html>

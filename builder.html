<!DOCTYPE html>
<html>
<head>
  <title>Portfolio Builder</title>
  <style>
    #builderArea { border: 1px solid #ccc; min-height: 300px; padding: 10px; }
    .block { background: #f0f0f0; margin: 5px; padding: 10px; cursor: grab; }
    .block img { max-width: 150px; }
  </style>
</head>
<body>
  <h2>Portfolio Builder</h2>
  <button onclick="addTextBlock()">Add Text</button>
  <input type="file" id="imageInput">
  <button onclick="addImageBlock()">Add Image</button>
  <button onclick="saveLayout()">Save Layout</button>
  <button onclick="logout()">Logout</button>
  <div id="builderArea"></div>

  <script type="module">
    const firebaseConfig = {
  apiKey: "AIzaSyAgaGbqIhaJrY_il83Cd0qWAcSQ4-w-59U",
  authDomain: "my-portfolio-fd7a4.firebaseapp.com",
  projectId: "my-portfolio-fd7a4",
  storageBucket: "my-portfolio-fd7a4.appspot.com",
  messagingSenderId: "1075228854748",
  appId: "1:1075228854748:web:cad3c816749243bc7fa719",
  measurementId: "G-84G30WZ1FK"
};
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const firebaseConfig = { /* your config here */ };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    function addTextBlock() {
      const builderArea = document.getElementById("builderArea");
      const newBlock = document.createElement("div");
      newBlock.className = "block";
      newBlock.contentEditable = true;
      newBlock.innerText = "Edit me!";
      builderArea.appendChild(newBlock);
    }

    async function addImageBlock() {
      const file = document.getElementById("imageInput").files[0];
      if (!file) return alert("No file selected!");
      const user = auth.currentUser;
      const storageRef = ref(storage, `users/${user.uid}/images/${file.name}`);
      await uploadBytes(storageRef, file);
      const url = await getDownloadURL(storageRef);

      const builderArea = document.getElementById("builderArea");
      const newBlock = document.createElement("div");
      newBlock.className = "block";
      newBlock.innerHTML = `<img src="${url}" alt="${file.name}">`;
      builderArea.appendChild(newBlock);

      await setDoc(doc(db, "users", user.uid, "portfolio", "main"), {
        projects: [{ name: file.name, imageUrl: url }]
      }, { merge: true });
    }

    async function saveLayout() {
      const blocks = [...document.querySelectorAll("#builderArea .block")].map(b => b.outerHTML);
      const user = auth.currentUser;
      await setDoc(doc(db, "users", user.uid, "portfolio", "layout"), { blocks });
      alert("Layout saved!");
    }

    async function loadLayout(uid) {
      const ref = doc(db, "users", uid, "portfolio", "layout");
      const snap = await getDoc(ref);
      if (snap.exists()) {
        const data = snap.data();
        const builderArea = document.getElementById("builderArea");
        builderArea.innerHTML = "";
        data.blocks.forEach(block => builderArea.insertAdjacentHTML("beforeend", block));
      }
    }

    function logout() {
      signOut(auth).then(() => window.location.href = "login.html");
    }

    onAuthStateChanged(auth, (user) => {
      if (user) loadLayout(user.uid);
      else window.location.href = "login.html";
    });
  </script>
</body>
</html>
